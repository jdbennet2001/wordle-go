name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deploys; cancel in-progress runs for the same ref.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GitHub Pages serves the repo under /<repository-name>/ so we need to
      # patch the root-relative paths in index.html to use a relative base.
      - name: Patch asset paths for Pages sub-path
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          BASE="/${REPO_NAME}"

          # Replace absolute paths for the three assets we control.
          sed -i \
            -e "s|href=\"/style.css\"|href=\"${BASE}/style.css\"|g" \
            -e "s|src=\"/app.js\"|src=\"${BASE}/app.js\"|g" \
            public/index.html

          # Patch the fetch path for words.json inside app.js.
          sed -i "s|\"/words.json\"|\"${BASE}/words.json\"|g" public/app.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Print published URL
        run: |
          echo "=================================================="
          echo "  Wordle Go is live at: ${{ steps.deploy.outputs.page_url }}"
          echo "=================================================="
