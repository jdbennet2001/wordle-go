name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Patch asset paths for GitHub Pages subpath
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          BASE="/${REPO_NAME}"

          echo "Using base path: ${BASE}"

          # Update index.html paths
          sed -i \
            -e "s|href=\"/style.css\"|href=\"${BASE}/style.css\"|g" \
            -e "s|src=\"/app.js\"|src=\"${BASE}/app.js\"|g" \
            public/index.html

          # Update JS fetch path
          sed -i \
            -e "s|\"/words.json\"|\"${BASE}/words.json\"|g" \
            public/app.js

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4