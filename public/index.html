<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Wordle Go</title>
  <link id="app-style" rel="stylesheet" href="style.css">
  <script>
    (function () {
      var key = Date.now();
      document.getElementById("app-style").href = "style.css?cb=" + key;
      window.__cacheBustKey = key;
    })();
  </script>
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <h1>Wordle Go</h1>
      <div class="header-actions">
        <button id="share-btn" type="button" disabled>Share</button>
        <button id="new-game-btn" type="button">New Puzzle</button>
      </div>
    </header>

    <section class="status-wrap" aria-live="polite">
      <p id="status-text">Loading words...</p>
    </section>

    <section class="board-wrap">
      <div id="board" class="board" aria-label="Wordle board"></div>
    </section>

    <section class="keyboard-wrap" aria-label="On-screen keyboard">
      <div id="keyboard" class="keyboard"></div>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script>
    (function () {
      var key = window.__cacheBustKey || Date.now();
      var appScript = document.createElement("script");
      appScript.src = "app.js?cb=" + key;
      document.body.appendChild(appScript);
    })();
  </script>
</body>
</html>
